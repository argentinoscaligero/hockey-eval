# /etc/nginx/sites-available/hockey-eval
# Reemplazá tests.penaltycorner.com.ar por tu subdominio real

# ── Redirigir HTTP → HTTPS ─────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name tests.penaltycorner.com.ar;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

# ── HTTPS principal ────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name tests.penaltycorner.com.ar;

    # Certificados (generados con certbot — ver instrucciones abajo)
    ssl_certificate     /etc/letsencrypt/live/tests.miclub.com.ar/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tests.miclub.com.ar/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Headers de seguridad
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # ── Frontend (archivos estáticos) ──────────────────────────
    root /var/www/hockey-eval;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        # Cache para assets
        location ~* \.(js|css|png|jpg|ico|svg|woff2?)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── Backend API (reverse proxy a Node.js) ─────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;

        # Límite de tamaño del body
        client_max_body_size 2m;
    }

    # Logs
    access_log /var/log/nginx/hockey-eval.access.log;
    error_log  /var/log/nginx/hockey-eval.error.log warn;
}
